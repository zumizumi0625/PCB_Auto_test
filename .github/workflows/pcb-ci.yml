name: PCB Design CI

on:
  push:
    branches: [main]
    paths:
      - 'hardware/**'
      - 'simulation/**'
      - '.kibot.yml'
      - '.github/workflows/pcb-ci.yml'
  pull_request:
    paths:
      - 'hardware/**'
      - 'simulation/**'
      - '.kibot.yml'

jobs:
  # ============================================
  # Job 1: KiCad DRC/ERC + 成果物生成
  # ============================================
  kicad-checks:
    name: "KiCad DRC/ERC & Outputs"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: batteryPack
            board: hardware/example/batteryPack.kicad_pcb
            schema: hardware/example/batteryPack.kicad_sch
          - name: kibom-test-marked
            board: hardware/example/kibom-test-marked.kicad_pcb
            schema: hardware/example/kibom-test-marked.kicad_sch

    steps:
      - uses: actions/checkout@v4

      - name: Run KiBot (Outputs)
        uses: INTI-CMNB/KiBot@v2_k8
        with:
          config: .kibot.yml
          board: ${{ matrix.project.board }}
          schema: ${{ matrix.project.schema }}
          dir: output/${{ matrix.project.name }}
          skip: run_erc,run_drc
        continue-on-error: true

      - name: Run DRC (JSON report)
        uses: docker://ghcr.io/inti-cmnb/kicad_auto:ki8
        with:
          entrypoint: /bin/bash
          args: >-
            -c "mkdir -p output/${{ matrix.project.name }}/reports &&
            kicad-cli pcb drc
            --output output/${{ matrix.project.name }}/reports/drc_report.json
            --format json
            --severity-all
            ${{ matrix.project.board }} || true"
        continue-on-error: true

      - name: Run ERC (JSON report)
        uses: docker://ghcr.io/inti-cmnb/kicad_auto:ki8
        with:
          entrypoint: /bin/bash
          args: >-
            -c "mkdir -p output/${{ matrix.project.name }}/reports &&
            kicad-cli sch erc
            --output output/${{ matrix.project.name }}/reports/erc_report.json
            --format json
            --severity-all
            ${{ matrix.project.schema }} || true"
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kicad-output-${{ matrix.project.name }}
          path: output/${{ matrix.project.name }}/
          retention-days: 30

      - name: Validate DRC/ERC results
        if: always()
        run: |
          python3 tools/check_drc_erc.py \
            "output/${{ matrix.project.name }}/reports" \
            --exclusions .drc-exclusions.json

  # ============================================
  # Job 2: SPICE シミュレーション
  # ============================================
  spice-simulation:
    name: "SPICE Simulation Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ngspice
        run: |
          sudo apt-get update
          sudo apt-get install -y ngspice

      - name: Auto-generate SPICE tests from schematics
        run: |
          for sch in hardware/**/*.kicad_sch; do
            echo "Generating tests for: $sch"
            python3 tools/generate_spice_tests.py "$sch" || true
          done

      - name: Run simulations
        id: sim
        run: python3 simulation/run_simulations.py
        continue-on-error: true

      - name: Upload simulation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulation-report
          path: |
            output/simulation_report.json
            output/waveforms/
          retention-days: 30

      - name: Check simulation result
        if: steps.sim.outcome == 'failure'
        run: exit 1

  # ============================================
  # Job 3: Discord 通知
  # ============================================
  discord-notify:
    name: "Discord Notification"
    runs-on: ubuntu-latest
    needs: [kicad-checks, spice-simulation]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download simulation report
        uses: actions/download-artifact@v4
        with:
          name: simulation-report
          path: report/
        continue-on-error: true

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KICAD_RESULT: ${{ needs.kicad-checks.result }}
          SPICE_RESULT: ${{ needs.spice-simulation.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MSG: ${{ github.event.head_commit.message && format('{0}', github.event.head_commit.message) || 'N/A' }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"].strip()
          print(f"Webhook URL length: {len(webhook)}, starts with: {webhook[:40]}...")
          kicad = os.environ["KICAD_RESULT"]
          spice = os.environ["SPICE_RESULT"]
          run_url = os.environ["RUN_URL"]
          commit_msg = os.environ.get("COMMIT_MSG", "").split("\n")[0][:80]
          commit_sha = os.environ.get("COMMIT_SHA", "")[:7]

          # Status icons
          icon = lambda s: "✅" if s == "success" else "❌" if s == "failure" else "⚠️"
          all_pass = kicad == "success" and spice == "success"

          # Build message
          lines = []
          if all_pass:
              lines.append(f"## ✅ PCB CI — All Passed")
          else:
              lines.append(f"## ❌ PCB CI — Failures Detected")
              if kicad == "failure":
                  lines.append("⚡ **DRC/ERCにエラー違反があります。修正してください。**")

          lines.append(f"Commit: `{commit_sha}` {commit_msg}")
          lines.append("")
          lines.append(f"{icon(kicad)} **KiCad DRC/ERC**: {kicad}")
          lines.append(f"{icon(spice)} **SPICE Simulation**: {spice}")

          # Parse simulation report for details
          report_path = "report/simulation_report.json"
          if os.path.exists(report_path):
              with open(report_path) as f:
                  report = json.load(f)

              lines.append("")
              lines.append(f"**SPICE Results: {report['passed']}/{report['total']} passed**")

              for name, test in report["tests"].items():
                  status = test["status"]
                  ic = "✅" if status == "PASS" else "❌"
                  lines.append(f"  {ic} `{name}`: {status}")

                  # Show values for failed tests
                  if status == "FAIL" and test.get("values"):
                      for k, v in test["values"].items():
                          lines.append(f"      {k} = {v}")
                      if test.get("message"):
                          lines.append(f"      💡 {test['message']}")

          lines.append("")
          lines.append(f"[View Run]({run_url})")

          content = "\n".join(lines)

          # Send to Discord (max 2000 chars)
          if len(content) > 1900:
              content = content[:1900] + "\n..."

          payload = json.dumps({"content": content}).encode()
          req = urllib.request.Request(webhook, data=payload, headers={
              "Content-Type": "application/json",
              "User-Agent": "PCB-CI-Bot/1.0",
          })
          try:
              urllib.request.urlopen(req)
          except urllib.error.HTTPError as e:
              print(f"Discord webhook error: {e.code} {e.reason}")
              body = e.read().decode()
              print(f"Response: {body}")
              raise
          print("Discord notification sent")
          PYEOF

  # ============================================
  # Job 4: PR コメントにサマリーを投稿
  # ============================================
  pr-summary:
    name: "PR Summary"
    runs-on: ubuntu-latest
    needs: [kicad-checks, spice-simulation]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let body = '## 🔧 PCB CI Results\n\n';

            const artifactDir = 'artifacts/';
            if (fs.existsSync(artifactDir)) {
              const dirs = fs.readdirSync(artifactDir);
              for (const dir of dirs) {
                body += `### 📋 ${dir}\n`;

                const reportsDir = path.join(artifactDir, dir, 'reports');
                if (fs.existsSync(reportsDir)) {
                  const files = fs.readdirSync(reportsDir);
                  for (const file of files) {
                    try {
                      const content = JSON.parse(fs.readFileSync(path.join(reportsDir, file), 'utf8'));
                      const violations = content.violations || [];
                      if (violations.length === 0) {
                        body += `- ✅ ${file}: No violations\n`;
                      } else {
                        const errors = violations.filter(v => (v.severity || 'error').toLowerCase() !== 'warning');
                        const warnings = violations.filter(v => (v.severity || 'error').toLowerCase() === 'warning');
                        if (errors.length > 0) {
                          body += `- ❌ ${file}: ${errors.length} error(s), ${warnings.length} warning(s)\n`;
                        } else {
                          body += `- ⚠️ ${file}: ${warnings.length} warning(s) only\n`;
                        }
                        for (const v of errors.slice(0, 5)) {
                          body += `  - 🔴 \`${v.type || 'error'}\`: ${v.description || JSON.stringify(v).slice(0, 100)}\n`;
                        }
                        for (const v of warnings.slice(0, 3)) {
                          body += `  - 🟡 \`${v.type || 'warning'}\`: ${v.description || JSON.stringify(v).slice(0, 100)}\n`;
                        }
                        if (errors.length > 5) body += `  - ... and ${errors.length - 5} more error(s)\n`;
                        if (warnings.length > 3) body += `  - ... and ${warnings.length - 3} more warning(s)\n`;
                      }
                    } catch (e) {
                      body += `- ⚠️ ${file}: Could not parse report\n`;
                    }
                  }
                }
                body += '\n';
              }
            }

            // Include simulation report if available
            const simReport = 'artifacts/simulation-report/simulation_report.json';
            if (fs.existsSync(simReport)) {
              const report = JSON.parse(fs.readFileSync(simReport, 'utf8'));
              body += `### 🔬 SPICE Simulation (${report.passed}/${report.total} passed)\n`;
              for (const [name, test] of Object.entries(report.tests)) {
                const icon = test.status === 'PASS' ? '✅' : '❌';
                body += `- ${icon} \`${name}\`: ${test.status}\n`;
                if (test.status === 'FAIL' && test.values) {
                  for (const [k, v] of Object.entries(test.values)) {
                    body += `  - ${k} = ${v}\n`;
                  }
                }
              }
              body += '\n';
            }

            body += '\n---\n🤖 Generated by PCB CI';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
